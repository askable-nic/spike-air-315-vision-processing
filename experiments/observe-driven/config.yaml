# observe-driven: Adaptive observe with event-driven frame selection
# Triage disabled — observe gets duration from video metadata directly.
# Adaptive 2-pass cursor tracking (2 FPS coarse, 15 FPS in active regions).
# Frame selection picks only the frames needed for LLM analysis.
# Analyse uses observe-driven batching instead of triage segments.

triage:
  enabled: false

observe:
  enabled: true

analyse:
  model: gemini-3-flash-preview
  temperature: 0.1
  max_concurrent: 5
  token_budget_per_segment: 50000
  tokens_per_frame: 1548
  jpeg_quality: 85
  source: unmod_website_test_video
  batch_gap_ms: 5000

merge:
  time_tolerance_ms: 2000
  similarity_threshold: 0.7
  discard_context_events: true
