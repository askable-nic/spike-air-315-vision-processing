# Iteration 2: ROI cropping + tighter event thresholds
# Enable ROI cropping to measure token reduction vs iteration 1.
# Tighten event synthesis thresholds based on expected iteration 1 noise.
# Higher tracking FPS for better temporal resolution.

observe:
  tracking_fps: 8.0
  resolution_height: 720
  match_threshold: 0.6
  early_exit_threshold: 0.9
  max_interpolation_gap_ms: 500
  smooth_window: 5
  smooth_displacement_threshold: 40.0
  # Flow at higher FPS for finer scroll detection
  flow_fps: 4.0
  flow_grid_step: 16
  flow_window_size_ms: 800
  flow_window_step_ms: 400
  # Tighter event thresholds
  hover_min_ms: 300
  hover_max_ms: 2000
  hover_radius_px: 15.0
  dwell_min_ms: 2000
  dwell_radius_px: 20.0
  thrash_min_direction_changes: 4
  thrash_min_speed_px_per_sec: 500.0
  thrash_angle_threshold_deg: 90.0
  click_stop_max_ms: 200
  click_stop_radius_px: 5.0
  click_min_confidence: 0.3
  scroll_min_flow_uniformity: 0.6
  scroll_min_magnitude: 3.0
  hesitation_min_ms: 500
  hesitation_max_ms: 2000
  hesitation_radius_px: 10.0
  # ROI cropping enabled — 512+64 padding = 640px crops
  roi_size: 512
  roi_padding: 64

analyse:
  # Lower tokens_per_frame to reflect ROI-cropped frame size
  tokens_per_frame: 258
